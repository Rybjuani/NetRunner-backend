name: Build Windows Agent

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install wheel pyinstaller requests websockets websocket-client

    - name: Build Windows executable
      run: python -m PyInstaller --onefile --noconsole --clean --collect-all requests --collect-all websockets --collect-all websocket-client --name netrunner_agent sync_agent.py

    - name: Get agent executable size
      id: get_size
      shell: pwsh
      run: |
        $filePath = "dist/netrunner_agent.exe"
        if (Test-Path $filePath) {
          $fileSize = (Get-Item $filePath).Length / 1MB
          Add-Content -Path $env:GITHUB_OUTPUT -Value "file_size=$([int]$fileSize)MB"
        } else {
          Add-Content -Path $env:GITHUB_OUTPUT -Value "file_size=0MB"
        }

    - name: Upload Windows agent artifact
      uses: actions/upload-artifact@v4
      with:
        name: netrunner-agent-windows-${{ steps.get_size.outputs.file_size }}
        path: dist/netrunner_agent.exe
        compression-level: 0
