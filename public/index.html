<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SystemBridge Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="src/styles.css">
</head>
<body>
    <div class="mesh-gradient"></div>
    <div class="noise-overlay"></div>

    <div class="app-shell">
        <header class="main-header">
            <div class="brand">
                <i class="fa-solid fa-bolt-lightning logo-icon"></i>
                <span class="logo-text">NETRUNNER</span>
            </div>
            <div class="model-picker">
                <select id="model-select"></select>
            </div>
        </header>

        <main id="chat-messages" class="chat-viewport">
            <!-- El chat comienza aquí directamente -->
        </main>

        <footer class="composer">
            <div class="composer-container">
                <form id="chat-form">
                    <textarea 
                        id="user-input" 
                        placeholder="Escribe una orden..." 
                        rows="1"
                        spellcheck="false"
                    ></textarea>
                    <button type="submit" id="send-btn">
                        <i class="fa-solid fa-arrow-up"></i>
                    </button>
                </form>
            </div>
        </footer>
    </div>

    <script src="src/config.js"></script>
    <script type="module" src="src/app-core.js"></script>
</body>
</html>
