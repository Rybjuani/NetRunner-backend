<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SystemBridge | Asistente IA de Productividad</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="src/styles.css?v=5.5.0">
</head>
<body>
    <div class="bg-grid"></div>
    <div class="bg-glow"></div>

    <div class="app-shell">
        <header class="main-header glass-panel">
            <div class="brand">
                <i class="fa-solid fa-shield-halved logo-icon"></i>
                <div>
                    <h1 class="logo-text">SystemBridge</h1>
                    <p class="logo-sub">Asistente IA de Productividad de Elite</p>
                </div>
            </div>
            <div class="model-picker">
                <select id="model-select"></select>
                <span id="bridge-status" class="bridge-status" aria-live="polite">Sincronizado</span>
            </div>
        </header>

        <main id="chat-messages" class="chat-viewport glass-panel"></main>

        <footer class="composer glass-panel">
            <form id="chat-form" class="prompt-box">
                <textarea
                    id="user-input"
                    placeholder="Describe la tarea que quieres resolver..."
                    rows="1"
                    spellcheck="false"
                ></textarea>
                <button type="submit" id="send-btn" aria-label="Enviar instruccion">
                    <i class="fa-solid fa-arrow-up"></i>
                </button>
            </form>
            <button id="sync-workspace-btn" class="sync-btn">
                <i class="fa-solid fa-wand-magic-sparkles"></i>
                <span>Activar Nodo Local</span>
            </button>
        </footer>
    </div>

    <script src="src/config.js?v=5.5.0"></script>
    <script type="module" src="src/app-core.js?v=5.5.0"></script>
</body>
</html>
