<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NetRunner Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="src/styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Indicador de Estado (Sutil) -->
        <div id="connection-indicator" class="status-dot offline" title="Desconectado"></div>

        <!-- Área de Chat / Landing -->
        <main id="chat-messages" class="messages-area">
            <!-- Landing se renderiza aquí por JS -->
        </main>

        <!-- Área de Entrada (Oculta al inicio) -->
        <footer class="input-area hidden">
            <form id="chat-form">
                <textarea id="user-input" rows="1" placeholder="Escribe tu petición..." required></textarea>
                <button type="submit" id="send-btn" style="display:none"></button> <!-- Submit con Enter -->
            </form>
        </footer>
    </div>

    <script src="src/config.js"></script>
    <script type="module" src="src/app-core.js"></script>
</body>
</html>
